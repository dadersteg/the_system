name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run JS & Python tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Clasp CLI
        run: npm install -g @google/clasp

      - name: Authenticate with Clasp
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Deploy to Private Project
        run: |
          cp .clasp-private.json .clasp.json
          clasp push --force

      - name: Deploy to Work/PMT Project
        run: |
          cp .clasp-work.json .clasp.json
          clasp push --force
